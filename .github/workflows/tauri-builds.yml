name: Tauri Builds

# Pozn.: GitHub Release se vytvoří až po pushi tagu v* (job release). Běžné pushy
# na main/master nahrávají jen workflow artefakty do záložky Actions.

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

# Pro softprops/action-gh-release (vytvoření release u tagu) potřebujeme zápis;
# u běžných větví/PR se release job nespouští.
permissions:
  contents: write

jobs:
  checks:
    name: Testy a lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

  build:
    name: Build ${{ matrix.name }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: Linux x64
            os: ubuntu-22.04
          - name: macOS Apple Silicon
            os: macos-14
          # macOS Intel (self-hosted): přidej znovu řádek s os: [self-hosted, macos, x64],
          # až bude k repu/org přiřazen runner — bez něj by job visel ve frontě.
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build

      - name: Portable exe pro release (přejmenovaný app.exe)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item -Path "src-tauri/target/release/app.exe" -Destination "GrommeR_portable.exe"

      # Windows: instalátory + portable; Mac/Linux bez rozbitých souborů z .app
      # (při sloučení artefaktů do release se jinak objeví samostatné Info.plist…).
      - name: Upload artefaktů (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            GrommeR_portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload artefaktů (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/**
          if-no-files-found: warn

      - name: Upload artefaktů (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Stáhnout build artefakty
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Vytvořit release a nahrát soubory
        uses: softprops/action-gh-release@v2
        with:
          name: Grommet Marks ${{ github.ref_name }}
          body: |
            Automatický build z GitHub Actions.

            | Platforma | Zdroj |
            |-----------|--------|
            | Windows | NSIS/MSI + `GrommeR_portable.exe` (portable, bez instalace) v `tauri-Windows x64` |
            | Linux | `tauri-Linux x64` |
            | macOS Apple Silicon | DMG (`*.dmg`) v `tauri-macos Apple Silicon` – přetáhnout aplikaci do „Aplikace“ |

            Repozitář: [h0nyik/GrommeR](https://github.com/h0nyik/GrommeR)
          files: artifacts/**
          fail_on_unmatched_files: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
