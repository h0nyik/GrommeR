name: Tauri Builds

# Produkční workflow – pouze větev master/main a tagy v* (NE test-v*).
# Testování updateru: workflow tauri-auto-update-test.yml (tagy test-v*,
# pre-release, endpoint updater-test), spuštění ručně přes workflow_dispatch.

# Pozn.: GitHub Release se vytvoří až po pushi tagu v* (job release). Běžné pushy
# na main/master nahrávají jen workflow artefakty do záložky Actions.

on:
  push:
    branches: ["main", "master"]
    tags:
      - "v*"
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

# Pro softprops/action-gh-release (vytvoření release u tagu) potřebujeme zápis;
# u běžných větví/PR se release job nespouští.
permissions:
  contents: write

jobs:
  checks:
    name: Testy a lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

  build:
    name: Build ${{ matrix.name }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: Linux x64
            os: ubuntu-22.04
          - name: macOS Apple Silicon
            os: macos-14
          # macOS Intel (self-hosted): přidej znovu řádek s os: [self-hosted, macos, x64],
          # až bude k repu/org přiřazen runner — bez něj by job visel ve frontě.
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      # POZOR: při bundle.createUpdaterArtifacts=true musí být TAURI_SIGNING_PRIVATE_KEY
      # nastaven už zde – jinak tauri build spadne (pubkey v tauri.conf bez private key).
      # Viz .cursor/rules/verified-procedures.mdc – neobcházet vypnutím createUpdaterArtifacts.
      - name: Build Tauri app
        run: npm run tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Podepsat updater artefakty (tag)
        if: startsWith(github.ref, 'refs/tags/')
        run: node scripts/sign-updater-artifacts.cjs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Portable exe pro release (přejmenovaný app.exe)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item -Path "src-tauri/target/release/app.exe" -Destination "GrommeR_portable.exe"

      # Windows: instalátory + portable; Mac/Linux bez rozbitých souborů z .app
      # (při sloučení artefaktů do release se jinak objeví samostatné Info.plist…).
      - name: Upload artefaktů (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            GrommeR_portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: warn

      - name: Upload artefaktů (Linux)
        if: matrix.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
          if-no-files-found: warn

      - name: Upload artefaktů (macOS)
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.tar.gz
            src-tauri/target/release/bundle/macos/*.tar.gz.sig
          if-no-files-found: warn

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stáhnout build artefakty
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Vytvořit latest.json pro Tauri updater
        id: latest_json
        continue-on-error: true
        run: node scripts/create-tauri-latest-json.cjs artifacts "${{ github.ref_name }}" "https://github.com/h0nyik/GrommeR"

      - name: Sestavit minimální sadu souborů pro Release
        run: node scripts/prepare-release-assets.cjs artifacts release-upload latest.json production

      - name: Připravit popis release
        run: |
          NOTES_FILE="release-notes/${{ github.ref_name }}.md"
          FOOTER=$'---\n\n## Stažení\n\n| Platforma | Soubory |\n|-----------|--------|\n| Windows | NSIS instalátor, MSI (volitelně), `GrommeR_portable.exe` |\n| Linux | AppImage (pokud build proběhl) |\n| macOS Apple Silicon | DMG (instalace); `*.app.tar.gz` jen pro automatickou aktualizaci |\n\n`latest.json` – manifest pro auto-update (není nutné stahovat ručně).\n\nRepozitář: [h0nyik/GrommeR](https://github.com/h0nyik/GrommeR)'
          if [ -f "$NOTES_FILE" ]; then
            { cat "$NOTES_FILE"; echo ""; echo "$FOOTER"; } > /tmp/release-body.md
          else
            {
              echo "## ⚠️ Chybí release poznámky"
              echo ""
              echo "Před dalším tagem doplňte \`release-notes/${{ github.ref_name }}.md\` (viz \`release-notes/TEMPLATE.md\`) – stručný přehled změn oproti předchozí verzi."
              echo ""
              echo "$FOOTER"
            } > /tmp/release-body.md
          fi

      - name: Vytvořit release a nahrát soubory
        uses: softprops/action-gh-release@v2
        with:
          name: Grommet Marks ${{ github.ref_name }}
          body_path: /tmp/release-body.md
          files: release-upload/**
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
