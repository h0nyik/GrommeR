name: Tauri Auto-Update Test

# Izolované testování updateru – nezasahuje do produkčního workflow (tauri-builds.yml)
# ani do /releases/latest. Tagy test-v* vytváří jen pre-release.

on:
  push:
    branches:
      - auto-update-testing
    tags:
      - "test-v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  checks:
    name: Testy a lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Run lint
        run: npm run lint

  build:
    name: Test build ${{ matrix.name }}
    needs: checks
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri app (test updater endpoint)
        run: npm run tauri build -- --config src-tauri/tauri.test.conf.json

      - name: Podepsat updater artefakty (test tag)
        if: startsWith(github.ref, 'refs/tags/test-v')
        run: node scripts/sign-updater-artifacts.cjs
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Portable exe pro test release
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item -Path "src-tauri/target/release/app.exe" -Destination "GrommeR_portable.exe"

      - name: Upload test artefaktů (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-test-${{ matrix.name }}
          path: |
            GrommeR_portable.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig
          if-no-files-found: warn

  release:
    name: Test GitHub Release (pre-release)
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/test-v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stáhnout test build artefakty
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Vytvořit latest-test.json pro Tauri updater
        id: latest_json
        continue-on-error: true
        run: node scripts/create-tauri-latest-json.cjs artifacts "${{ github.ref_name }}" "https://github.com/h0nyik/GrommeR" latest-test.json

      - name: Vytvořit pre-release pro test tag
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(artifacts/*.exe artifacts/*.exe.sig artifacts/*.msi artifacts/*.msi.sig artifacts/latest-test.json artifacts/GrommeR_portable.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Žádné soubory k nahrání do release ${{ github.ref_name }}."
            exit 1
          fi
          notes="**Testovací build pro auto-update** – není produkční release.

          Updater endpoint v tomto buildu: \`releases/download/updater-test/latest-test.json\`

          | Platforma | Zdroj |
          |-----------|--------|
          | Windows | NSIS/MSI + \`GrommeR_portable.exe\` |

          Po ověření updateru sloučit do \`master\` a vydat produkční tag \`v*\`."
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release upload "${{ github.ref_name }}" "${files[@]}" --clobber
            gh release edit "${{ github.ref_name }}" --prerelease --title "Grommet Marks ${{ github.ref_name }} (updater test)" --notes "$notes"
          else
            gh release create "${{ github.ref_name }}" \
              --prerelease \
              --title "Grommet Marks ${{ github.ref_name }} (updater test)" \
              --notes "$notes" \
              "${files[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Aktualizovat test kanál updater-test
        if: steps.latest_json.outcome == 'success' && github.ref_name != 'test-v0.2.7'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/create-tauri-latest-json.cjs artifacts "${{ github.ref_name }}" "https://github.com/h0nyik/GrommeR" latest-test.json updater-test
          shopt -s globstar nullglob
          files=(artifacts/*.exe artifacts/*.exe.sig artifacts/*.msi artifacts/*.msi.sig artifacts/latest-test.json artifacts/GrommeR_portable.exe)
          if [ ${#files[@]} -eq 0 ]; then
            echo "Žádné soubory k nahrání do updater-test."
            exit 1
          fi
          if gh release view updater-test >/dev/null 2>&1; then
            gh release upload updater-test "${files[@]}" --clobber
          else
            gh release create updater-test \
              --prerelease \
              --title "Auto-update test channel" \
              --notes "Stabilní URL pro testování updateru. Soubory se přepisují při každém tagu test-v*." \
              "${files[@]}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
